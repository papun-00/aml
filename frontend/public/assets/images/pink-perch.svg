    <!-- Pelvic fin -->
    <path d="M340,400 C345,420 350,435 360,440 C368,443 375,435 372,425 C368,412 358,402 348,398" fill="#d07070" stroke="#b06060" stroke-width="1" opacity="0.6"/>
    <!-- Tail (caudal fin) -->
    <path d="M155,300 C130,270 110,240 100,220 C95,210 100,208 110,215 C125,228 145,260 155,290" fill="#e88888" stroke="#c06060" stroke-width="1"/>
    <path d="M155,310 C130,340 110,370 100,390 C95,400 100,402 110,395 C125,382 145,350 155,320" fill="#e88888" stroke="#c06060" stroke-width="1"/>
    <!-- Eye -->
    <circle cx="600" cy="280" r="18" fill="#fff" stroke="#c06060" stroke-width="1.5"/>
    <circle cx="602" cy="278" r="10" fill="#1a1a2e"/>
    <circle cx="605" cy="275" r="4" fill="#fff" opacity="0.7"/>
    <!-- Mouth -->
    <path d="M652,320 C660,322 665,328 660,335" stroke="#a06060" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Gill -->
    <path d="M565,260 C558,280 555,310 560,340" stroke="#c06060" stroke-width="2" fill="none" opacity="0.4"/>
  </g>
  <g opacity="0.12">
    <circle cx="140" cy="150" r="3" fill="#f0a0a0"/>
    <circle cx="700" cy="450" r="4" fill="#f0a0a0"/>
    <circle cx="120" cy="460" r="2" fill="#f0a0a0"/>
  </g>
  <text x="400" y="560" text-anchor="middle" font-family="'IBM Plex Sans',sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.7)">Pink Perch · Nemipterus japonicus</text>
</svg>
