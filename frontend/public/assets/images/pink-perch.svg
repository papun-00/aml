    <!-- Scale pattern -->
    <g opacity="0.15" stroke="#a06060" stroke-width="0.5" fill="none">
      <path d="M250,220 C260,230 258,245 248,250 M280,210 C290,220 288,235 278,240 M310,205 C320,215 318,230 308,235 M340,200 C350,210 348,225 338,230 M370,198 C380,208 378,223 368,228 M400,200 C410,210 408,225 398,230 M430,205 C440,215 438,230 428,235 M460,215 C470,225 468,240 458,245 M490,228 C500,238 498,253 488,258 M520,245 C530,255 528,270 518,275"/>
      <path d="M240,260 C250,270 248,285 238,290 M270,252 C280,262 278,277 268,282 M300,248 C310,258 308,273 298,278 M330,245 C340,255 338,270 328,275 M360,244 C370,254 368,269 358,274 M390,246 C400,256 398,271 388,276 M420,250 C430,260 428,275 418,280 M450,258 C460,268 458,283 448,288 M480,268 C490,278 488,293 478,298 M510,280 C520,290 518,305 508,310"/>
      <path d="M230,300 C240,310 238,325 228,330 M260,295 C270,305 268,320 258,325 M290,290 C300,300 298,315 288,320 M320,288 C330,298 328,313 318,318 M350,287 C360,297 358,312 348,317 M380,290 C390,300 388,315 378,320 M410,295 C420,305 418,320 408,325 M440,302 C450,312 448,327 438,332 M470,312 C480,322 478,337 468,342 M500,325 C510,335 508,350 498,355"/>
    </g>
    <!-- Lateral line -->
    <path d="M200,290 C280,280 400,275 520,285 C580,290 625,300 650,310" stroke="#c06060" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="8,4"/>
    <!-- Dorsal fin -->
    <path d="M300,180 C310,140 340,110 380,100 C420,95 460,105 490,120 C510,130 530,155 540,180" fill="#d07070" stroke="#b06060" stroke-width="1" opacity="0.8"/>
    <g stroke="#b06060" stroke-width="0.8" fill="none" opacity="0.4">
      <path d="M320,175 C325,145 350,120 380,110"/>
      <path d="M360,178 C362,150 380,125 400,115"/>
      <path d="M400,180 C400,155 410,130 430,118"/>
      <path d="M440,182 C438,160 445,140 465,125"/>
      <path d="M480,185 C478,165 485,150 500,140"/>
    </g>
    <!-- Anal fin -->
    <path d="M380,435 C390,460 410,475 440,478 C460,480 490,470 510,450 C520,440 525,430 520,425" fill="#d07070" stroke="#b06060" stroke-width="1" opacity="0.7"/>
