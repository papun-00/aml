<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1e3d"/>
      <stop offset="100%" stop-color="#1a0d30"/>
    </linearGradient>
    <linearGradient id="fish1" x1="150" y1="220" x2="650" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0a0a0"/>
      <stop offset="30%" stop-color="#e88888"/>
      <stop offset="60%" stop-color="#d07070"/>
      <stop offset="100%" stop-color="#f0b8b8"/>
    </linearGradient>
    <linearGradient id="fishbelly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="glow5" cx="400" cy="300" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(200,100,100,0.1)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="shadow5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg5)"/>
  <circle cx="400" cy="300" r="260" fill="url(#glow5)"/>
  <g filter="url(#shadow5)">
