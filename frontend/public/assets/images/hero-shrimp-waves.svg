   height="2160"
   preserveAspectRatio="xMidYMid"
   role="img"
   aria-label="Realistic Cooked Shrimp on Gentle Waves"
   version="1.1"
   id="svg33"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:dc="http://purl.org/dc/elements/1.1/">
  <!-- 🌍 SEO & AI METADATA -->
  <title
     id="title1">Realistic Cooked Shrimp Illustration | Seafood Export Hero Image</title>
  <desc
     id="desc1">A high-quality, detailed vector illustration of a cooked shrimp floating above gentle realistic waves. Designed for premium seafood export landing pages with smooth, minimal animation.</desc>
  <metadata
     id="metadata1">
    <meta
       name="description"
       content="Professional seafood export hero image featuring a realistic cooked shrimp vector illustration with subtle wave animation." />
    <meta
       name="keywords"
       content="seafood export, realistic shrimp, cooked prawn, seafood logo, marine export, high quality svg, vector illustration" />
    <meta
       name="theme-color"
       content="#FFFFFF" />
    <meta
       name="designer"
       content="AI Vector Generator" />
    <rdf:RDF>
      <cc:Work
         rdf:about="">
        <dc:title>Realistic Cooked Shrimp Illustration | Seafood Export Hero Image</dc:title>
      </cc:Work>
    </rdf:RDF>
  </metadata>
  <defs
     id="defs29">
    <!-- 🎨 GRADIENTS FOR REALISM -->
    <!-- Shrimp Body Gradient (Cooked Orange/Pink) -->
    <!-- Shrimp Highlight (Glossy Texture) -->
    <!-- Wave Gradients -->
    <linearGradient
       id="wave1-grad"
       x1="0"
       y1="-60.302269"
       x2="0"
       y2="603.02271"
       gradientTransform="scale(3.0151134,0.33166248)"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         stop-color="#00B4DB"
         id="stop7" />
      <stop
         offset="100%"
         stop-color="#0083B0"
         id="stop8" />
    </linearGradient>
    <linearGradient
       id="wave2-grad"
       x1="0"
       y1="-74.535599"
       x2="0"
       y2="596.28479"
       gradientTransform="scale(2.981424,0.3354102)"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         stop-color="#0083B0"
         id="stop9" />
      <stop
         offset="100%"
         stop-color="#00527A"
         id="stop10" />
    </linearGradient>
    <!-- Drop Shadow Filter -->
    <!-- 🦐 REUSABLE DETAILED SHRIMP PATH -->
  </defs>
  <style
     id="style29">
    /* 🌊 ANIMATIONS */
    
    /* Gentle Float for Shrimp */
    .float-shrimp {
      animation: float 6s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(1.5deg); }
    }

    /* ✅ FIXED: Wave Motion (Seamless Loop) */
    /* Distance increased to 800px to match wave pattern period */
    /* Duration increased to maintain gentle speed */
    .wave-flow {
      animation: wave-flow-anim 48s linear infinite;
      transform-origin: 0 0;
    }
    .wave-flow-reverse {
      animation: wave-flow-anim-reverse 72s linear infinite;
      transform-origin: 0 0;
    }

    @keyframes wave-flow-anim {
      0% { transform: translateX(0); }
      100% { transform: translateX(-800px); }
    }
    @keyframes wave-flow-anim-reverse {
      0% { transform: translateX(-800px); }
      100% { transform: translateX(0); }
    }
  </style>
  <!-- 1. Background -->
  <!-- 2. Shrimp Layer (Centered) -->
  <!-- 3. Water Waves Layer (Bottom) -->
  <g
     id="waves-container"
     transform="matrix(1.8774274,0,0,2.1731342,28.233008,97.380185)">
    <!-- Back Wave -->
    <g
       transform="translate(0,680)"
       id="g31">
      <path
         class="wave-flow-reverse"
         d="m 0,0 q 200,50 400,0 200,-50 400,0 200,50 400,0 200,-50 400,0 200,50 400,0 V 200 H 0 Z"
         fill="url(#wave2-grad)"
         opacity="0.8"
         id="path30"
         style="fill:url(#wave2-grad)" />
    </g>
    <!-- Front Wave -->
    <g
       transform="translate(0,740)"
       id="g32">
      <path
         class="wave-flow"
         d="m 0,0 q 250,40 500,0 250,-40 500,0 250,40 500,0 250,-40 500,0 V 200 H 0 Z"
         fill="url(#wave1-grad)"
         opacity="0.9"
         id="path31"
         style="fill:url(#wave1-grad)" />
    </g>
    <!-- Foam/Highlights on Waves -->
    <g
       opacity="0.6"
       id="g33">
      <path
         class="wave-flow"
         d="m 0,0 q 250,40 500,0 250,-40 500,0 250,40 500,0 250,-40 500,0"
         fill="none"
         stroke="#ffffff"
         stroke-width="4"
         stroke-linecap="round"
         id="path32" />
    </g>
  </g>
</svg>
