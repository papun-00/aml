# Certification Badges Configuration
# -----------------------------------
# Add new certifications by appending a [[certs]] entry.
# The Rust frontend reads this at compile time — rebuild to reflect changes.

[layout]
direction   = "horizontal"   # "horizontal" | "vertical"
rows        = 1               # 1 = single line, 2 = double line, etc.
stamp_size  = 40              # px — uniform width & height for every badge
gap         = 12              # px — spacing between badges

[[certs]]
id          = "bap"
name        = "BAP 4-Star"
badge_type  = "inline"        # "inline" (SVG rendered in code) | "image" (external file)
brand_color = "#1B3A5C"
label_short = "BAP"
label_line2 = "4-STAR"
icon_text   = "★★★★"

