<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none" opacity="0.06">
  <!-- Decorative seafood background pattern with shrimp, waves, bubbles -->
  <!-- Shrimp silhouette 1 (top right) -->
  <g transform="translate(850,80) rotate(-20) scale(1.2)">
    <path d="M0,0 C15,-20 50,-30 80,-20 C100,-10 115,10 120,35 C125,60 115,80 95,90 C75,100 50,95 30,80 C10,65 -5,40 -8,20 C-10,8 -5,5 0,0Z" fill="currentColor"/>
    <path d="M-8,15 C-20,5 -35,-5 -45,0 C-50,5 -45,15 -35,18 C-25,21 -12,18 -8,15Z" fill="currentColor"/>
    <path d="M120,25 C135,15 150,8 160,15" stroke="currentColor" stroke-width="3" fill="none"/>
    <path d="M118,30 C138,25 155,30 170,22" stroke="currentColor" stroke-width="2" fill="none"/>
  </g>
  <!-- Shrimp silhouette 2 (bottom left) -->
  <g transform="translate(120,550) rotate(15) scale(0.9)">
    <path d="M0,0 C15,-20 50,-30 80,-20 C100,-10 115,10 120,35 C125,60 115,80 95,90 C75,100 50,95 30,80 C10,65 -5,40 -8,20 C-10,8 -5,5 0,0Z" fill="currentColor"/>
    <path d="M-8,15 C-20,5 -35,-5 -45,0 C-50,5 -45,15 -35,18 C-25,21 -12,18 -8,15Z" fill="currentColor"/>
    <path d="M120,25 C135,15 150,8 160,15" stroke="currentColor" stroke-width="3" fill="none"/>
  </g>
  <!-- Wave lines -->
  <path d="M0,200 C100,180 200,220 300,200 C400,180 500,220 600,200 C700,180 800,220 900,200 C1000,180 1100,220 1200,200" stroke="currentColor" stroke-width="2" fill="none"/>
  <path d="M0,600 C100,580 200,620 300,600 C400,580 500,620 600,600 C700,580 800,620 900,600 C1000,580 1100,620 1200,600" stroke="currentColor" stroke-width="2" fill="none"/>
  <!-- Bubbles -->
  <circle cx="200" cy="120" r="15" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <circle cx="220" cy="95" r="8" stroke="currentColor" stroke-width="1" fill="none"/>
  <circle cx="950" cy="650" r="20" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <circle cx="980" cy="620" r="10" stroke="currentColor" stroke-width="1" fill="none"/>
  <circle cx="600" cy="750" r="12" stroke="currentColor" stroke-width="1" fill="none"/>
  <!-- Small fish silhouette -->
  <g transform="translate(700,350) scale(0.6)">
    <path d="M0,0 C20,-25 60,-35 100,-25 C130,-18 150,0 145,20 C140,40 120,55 90,55 C60,55 25,40 10,25 C0,15 -5,8 0,0Z" fill="currentColor"/>
    <path d="M-15,5 C-30,-5 -40,5 -30,15 C-20,25 -5,15 -15,5Z" fill="currentColor"/>
  </g>
  <!-- Seaweed strands -->
  <path d="M50,800 C55,720 45,650 55,580 C65,510 50,440 60,370" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M80,800 C85,740 75,680 85,620 C95,560 82,500 90,440" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M1140,800 C1135,730 1145,660 1135,590 C1125,520 1140,450 1130,380" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
