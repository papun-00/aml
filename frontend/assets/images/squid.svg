<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#071a2e"/>
      <stop offset="100%" stop-color="#0d3a3a"/>
    </linearGradient>
    <linearGradient id="squid1" x1="350" y1="80" x2="450" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0e0d0"/>
      <stop offset="40%" stop-color="#e8cbb8"/>
      <stop offset="100%" stop-color="#c8a088"/>
    </linearGradient>
    <radialGradient id="glow3" cx="400" cy="280" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(0,180,160,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg3)"/>
  <circle cx="400" cy="280" r="250" fill="url(#glow3)"/>
  <g filter="url(#shadow3)">
    <!-- Mantle (body) -->
    <path d="M340,80 C310,80 280,100 270,140 C255,195 260,270 275,340 C290,410 320,440 400,445 C480,440 510,410 525,340 C540,270 545,195 530,140 C520,100 490,80 460,80 C440,75 360,75 340,80Z" fill="url(#squid1)" stroke="#b89078" stroke-width="1.5"/>
    <!-- Mantle texture lines -->
    <g stroke="#c8a088" stroke-width="1" fill="none" opacity="0.4">
      <path d="M310,120 C330,130 380,135 400,134 C420,133 470,128 490,118"/>
      <path d="M300,160 C325,172 370,178 400,177 C430,176 475,170 500,158"/>
      <path d="M295,200 C322,215 368,222 400,221 C432,220 478,213 505,198"/>
      <path d="M292,250 C320,268 366,276 400,275 C434,274 480,266 508,248"/>
      <path d="M295,300 C322,320 366,330 400,329 C434,328 478,318 505,298"/>
      <path d="M305,350 C330,370 368,378 400,377 C432,376 470,368 495,348"/>
    </g>
    <!-- Fins (side triangles) -->
    <path d="M270,140 C240,170 210,220 200,260 C195,280 210,285 230,270 C250,255 265,220 270,190Z" fill="#e8cbb8" stroke="#b89078" stroke-width="1" opacity="0.9"/>
    <path d="M530,140 C560,170 590,220 600,260 C605,280 590,285 570,270 C550,255 535,220 530,190Z" fill="#e8cbb8" stroke="#b89078" stroke-width="1" opacity="0.9"/>
    <!-- Eyes -->
    <ellipse cx="340" cy="160" rx="22" ry="26" fill="#0d1a2e" stroke="#b89078" stroke-width="1.5"/>
    <ellipse cx="342" cy="158" rx="10" ry="14" fill="#1a3050"/>
    <ellipse cx="343" cy="155" rx="5" ry="6" fill="#fff" opacity="0.6"/>
    <ellipse cx="460" cy="160" rx="22" ry="26" fill="#0d1a2e" stroke="#b89078" stroke-width="1.5"/>
    <ellipse cx="462" cy="158" rx="10" ry="14" fill="#1a3050"/>
    <ellipse cx="463" cy="155" rx="5" ry="6" fill="#fff" opacity="0.6"/>
    <!-- Tentacles -->
    <g stroke-linecap="round" fill="none">
      <path d="M370,445 C365,470 355,500 340,530 C325,560 310,575 320,580" stroke="#e8cbb8" stroke-width="6"/>
      <path d="M390,448 C388,475 382,510 375,545 C370,565 375,580 385,575" stroke="#d8b8a0" stroke-width="5"/>
      <path d="M410,448 C412,475 418,510 425,545 C430,565 425,580 415,575" stroke="#d8b8a0" stroke-width="5"/>
      <path d="M430,445 C435,470 445,500 460,530 C475,560 490,575 480,580" stroke="#e8cbb8" stroke-width="6"/>
      <!-- Longer hunting tentacles -->
      <path d="M355,447 C340,480 310,530 280,560 C260,575 250,585 260,590 C270,595 290,580 310,555" stroke="#c8a088" stroke-width="4"/>
      <path d="M445,447 C460,480 490,530 520,560 C540,575 550,585 540,590 C530,595 510,580 490,555" stroke="#c8a088" stroke-width="4"/>
      <!-- Suction cups (dots) -->
      <g fill="#b89078" opacity="0.6">
        <circle cx="362" cy="465" r="2.5"/><circle cx="358" cy="485" r="2.5"/><circle cx="352" cy="505" r="2.5"/>
        <circle cx="345" cy="525" r="2"/><circle cx="335" cy="545" r="2"/>
        <circle cx="438" cy="465" r="2.5"/><circle cx="442" cy="485" r="2.5"/><circle cx="448" cy="505" r="2.5"/>
        <circle cx="455" cy="525" r="2"/><circle cx="465" cy="545" r="2"/>
      </g>
    </g>
    <!-- Chromatophore spots -->
    <g opacity="0.2">
      <circle cx="360" cy="220" r="6" fill="#8b6050"/>
      <circle cx="420" cy="250" r="5" fill="#8b6050"/>
      <circle cx="380" cy="300" r="7" fill="#8b6050"/>
      <circle cx="440" cy="320" r="5" fill="#8b6050"/>
      <circle cx="370" cy="370" r="6" fill="#8b6050"/>
    </g>
  </g>
  <!-- Bubbles -->
  <g opacity="0.15">
    <circle cx="180" cy="400" r="4" fill="#78d6d6"/>
    <circle cx="620" cy="180" r="3" fill="#78d6d6"/>
    <circle cx="160" cy="150" r="2" fill="#78d6d6"/>
    <circle cx="650" cy="420" r="5" fill="#78d6d6"/>
  </g>
  <text x="400" y="560" text-anchor="middle" font-family="'IBM Plex Sans',sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.7)">Indian Squid · Doryteuthis sibogae</text>
</svg>
