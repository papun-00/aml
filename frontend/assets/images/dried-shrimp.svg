      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="100%" stop-color="#2a1e10"/>
    </linearGradient>
    <linearGradient id="dried1" x1="200" y1="200" x2="500" y2="400" gradientUnits="userSpaceOnUse">
