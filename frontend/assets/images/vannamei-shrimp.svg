<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1e3d"/>
      <stop offset="100%" stop-color="#0d4a4a"/>
    </linearGradient>
    <linearGradient id="shrimp1" x1="200" y1="150" x2="600" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8956a"/>
      <stop offset="50%" stop-color="#d4694a"/>
      <stop offset="100%" stop-color="#b8442a"/>
    </linearGradient>
    <linearGradient id="shrimp-highlight" x1="300" y1="200" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f2b898"/>
      <stop offset="100%" stop-color="#e8956a"/>
    </linearGradient>
    <radialGradient id="glow" cx="400" cy="300" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(15,180,180,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="400" cy="300" r="250" fill="url(#glow)"/>
  <!-- Ice crystals background -->
  <g opacity="0.08" stroke="#78d6d6" stroke-width="1">
    <line x1="100" y1="80" x2="140" y2="120"/><line x1="140" y1="120" x2="100" y2="160"/>
    <line x1="680" y1="450" x2="720" y2="490"/><line x1="720" y1="490" x2="680" y2="530"/>
    <line x1="650" y1="100" x2="690" y2="60"/><line x1="150" y1="500" x2="190" y2="460"/>
  </g>
  <!-- Shrimp body -->
  <g filter="url(#shadow)">
    <!-- Main body curve -->
    <path d="M250,220 C280,200 340,180 400,200 C460,220 500,270 520,320 C540,370 530,420 490,440 C450,460 400,450 360,430 C320,410 290,370 270,320 C250,270 240,240 250,220Z" fill="url(#shrimp1)" stroke="#b8442a" stroke-width="1.5"/>
    <!-- Segments -->
    <path d="M310,210 C340,230 370,280 360,330" stroke="#c05535" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M350,200 C370,230 390,280 385,340" stroke="#c05535" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M390,205 C400,240 410,290 410,350" stroke="#c05535" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M430,220 C430,260 435,310 430,370" stroke="#c05535" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M465,245 C458,280 455,320 450,380" stroke="#c05535" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Highlight/belly -->
    <path d="M280,240 C310,230 360,220 400,230 C440,240 470,270 490,310 C500,340 495,370 480,390" fill="url(#shrimp-highlight)" opacity="0.4"/>
    <!-- Tail fan -->
    <path d="M240,230 C220,200 190,180 170,190 C160,195 165,215 180,225 C195,235 220,235 240,230Z" fill="#d4694a" stroke="#b8442a" stroke-width="1"/>
    <path d="M245,225 C215,190 185,160 165,165 C155,170 160,190 175,205 C190,220 220,225 245,225Z" fill="#e8956a" stroke="#b8442a" stroke-width="1"/>
    <path d="M248,235 C225,215 195,205 180,215 C172,220 178,238 192,245 C206,252 230,248 248,235Z" fill="#c05535" stroke="#b8442a" stroke-width="1"/>
    <!-- Head -->
    <path d="M500,310 C530,300 560,290 580,270 C600,250 610,230 600,215 C590,200 570,200 550,210 C530,220 515,250 510,280 C505,295 502,305 500,310Z" fill="#d4694a" stroke="#b8442a" stroke-width="1.5"/>
    <!-- Eye -->
    <circle cx="570" cy="240" r="10" fill="#1a1a2e"/>
    <circle cx="572" cy="238" r="4" fill="#fff" opacity="0.8"/>
    <!-- Rostrum (horn) -->
    <path d="M590,225 C610,210 640,190 670,175" stroke="#d4694a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Antennae -->
    <path d="M585,230 C620,220 660,230 700,210" stroke="#e8956a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M580,235 C610,250 650,260 690,250" stroke="#e8956a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <g stroke="#d4694a" stroke-width="1.5" fill="none" stroke-linecap="round">
      <path d="M440,400 C445,420 440,440 430,460"/>
      <path d="M410,420 C415,440 412,455 405,470"/>
      <path d="M380,430 C385,448 383,460 378,475"/>
      <path d="M480,370 C490,390 488,410 480,430"/>
      <path d="M500,340 C515,360 515,380 508,400"/>
    </g>
    <!-- Swimmerets -->
    <g stroke="#c05535" stroke-width="1" fill="none" opacity="0.5">
      <path d="M350,420 C355,435 350,445 345,455"/>
      <path d="M370,425 C375,440 372,450 368,460"/>
    </g>
  </g>
  <!-- Subtle water particles -->
  <g opacity="0.15">
    <circle cx="150" cy="350" r="3" fill="#78d6d6"/>
    <circle cx="650" cy="150" r="2" fill="#78d6d6"/>
    <circle cx="700" cy="400" r="4" fill="#78d6d6"/>
    <circle cx="120" cy="200" r="2" fill="#78d6d6"/>
    <circle cx="680" cy="520" r="3" fill="#78d6d6"/>
  </g>
  <!-- Label -->
  <text x="400" y="560" text-anchor="middle" font-family="'IBM Plex Sans',sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.7)">Vannamei Shrimp · Litopenaeus vannamei</text>
</svg>
