server {
    listen 80;
    server_name alashoremarine.com www.alashoremarine.com;

    # Redirect HTTP → HTTPS
    return 301 https://alashoremarine.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name alashoremarine.com;

    # SSL (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/alashoremarine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alashoremarine.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # HSTS — required for strong Google ranking signal
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers — also read by AI crawlers as trust signals
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self)" always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # Gzip — improves LCP (Core Web Vitals → SEO)
    gzip on;
    gzip_types text/html text/css application/javascript application/wasm
               application/json image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static assets — long cache ──────────────────────────────
    location ~* \.(wasm|js|css|png|jpg|svg|ico|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SEO files — short cache, always fresh ──────────────────
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "text/plain; charset=utf-8";
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "application/xml; charset=utf-8";
    }

    location = /sitemap-products.xml {
        expires 1d;
        add_header Content-Type "application/xml; charset=utf-8";
    }

    # ── AI crawlers — llms.txt ─────────────────────────────────
    location = /llms.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # ── API reverse proxy ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── SPA fallback — all routes → index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        # canonical redirect: www → non-www
        if ($host = "www.alashoremarine.com") {
            return 301 https://alashoremarine.com$request_uri;
        }
    }
}
